<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sirven Ouamba · Carte</title>
<meta name="theme-color" content="#0D0D0D">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0D0D0D;
  --bg-elev: rgba(255, 255, 255, 0.04);
  --border: rgba(255, 255, 255, 0.08);
  --border-hover: rgba(255, 255, 255, 0.16);
  --violet: #7B2D8E;
  --violet-glow: rgba(123, 45, 142, 0.35);
  --flame: #E8651A;
  --flame-glow: rgba(232, 101, 26, 0.35);
  --text: #FAFAFA;
  --text-muted: rgba(250, 250, 250, 0.55);
  --text-faint: rgba(250, 250, 250, 0.35);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, var(--violet-glow), transparent 60%),
    radial-gradient(ellipse 55% 40% at 80% 90%, var(--flame-glow), transparent 60%);
  opacity: 0.5;
  z-index: 0;
  pointer-events: none;
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  aspect-ratio: 5 / 8;
  background: rgba(20, 20, 20, 0.6);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid var(--border-hover);
  border-radius: 28px;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow:
    0 40px 80px -20px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(255, 255, 255, 0.04) inset,
    0 20px 40px -10px var(--violet-glow);
  animation: cardIn 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: conic-gradient(
    from 180deg,
    transparent 0deg,
    var(--violet-glow) 90deg,
    transparent 180deg,
    var(--flame-glow) 270deg,
    transparent 360deg
  );
  opacity: 0.15;
  animation: spin 20s linear infinite;
  pointer-events: none;
}

.card-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
}

.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: auto;
}

.mono {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--violet) 0%, var(--flame) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -1px;
  color: #fff;
  box-shadow: 0 0 20px var(--violet-glow);
  flex-shrink: 0;
}

.name {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.name-main {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.name-role {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}

.qr-slot {
  margin: 20px auto;
  padding: 14px;
  background: #fff;
  border-radius: 18px;
  line-height: 0;
  box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
}

.qr-slot canvas,
.qr-slot img {
  display: block;
  width: 220px !important;
  height: 220px !important;
}

.card-bottom {
  margin-top: auto;
  text-align: center;
}

.tagline {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.2px;
  margin-bottom: 4px;
}

.tagline .flame {
  color: var(--flame);
}

.tagline-sub {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  margin-bottom: 18px;
}

.url-bar {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

.url-bar-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--flame);
  box-shadow: 0 0 8px var(--flame-glow);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.2); }
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Actions */
.actions {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 10px;
  margin-top: 24px;
  opacity: 0;
  animation: fadeIn 0.6s ease 0.4s forwards;
}

.action-btn {
  padding: 12px 20px;
  border: 1px solid var(--border-hover);
  background: rgba(20, 20, 20, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  border-radius: 12px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s ease;
}

.action-btn:hover {
  background: rgba(30, 30, 30, 0.7);
  border-color: var(--flame);
}

.action-btn svg {
  width: 15px;
  height: 15px;
  stroke-width: 2;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(13, 13, 13, 0.92);
  backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--border-hover);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Print */
@media print {
  body {
    background: #fff !important;
    padding: 0;
    min-height: auto;
  }
  body::before { display: none; }
  .actions, .toast { display: none !important; }
  .card {
    box-shadow: none;
    border: 1px solid #ddd;
    animation: none;
    page-break-inside: avoid;
    max-width: 100mm;
    aspect-ratio: 5/8;
    margin: 20mm auto;
  }
  .card::before { display: none; }
  @page {
    size: A4;
    margin: 0;
  }
}

@media (max-width: 420px) {
  .card { max-width: 340px; padding: 28px 24px; }
  .qr-slot canvas, .qr-slot img { width: 200px !important; height: 200px !important; }
}
</style>
</head>
<body>

<div class="card">
  <div class="card-inner">
    <div class="card-top">
      <div class="mono">S</div>
      <div class="name">
        <span class="name-main">Sirven Ouamba</span>
        <span class="name-role">Founder · Flaynn</span>
      </div>
    </div>

    <div class="qr-slot" id="qrSlot"></div>

    <div class="card-bottom">
      <div class="tagline"><span class="flame">Stop Pitching.</span> Start Proving.</div>
      <div class="tagline-sub">Le scoring qui ne ment pas.</div>
      <div class="url-bar">
        <span class="url-bar-dot"></span>
        links.flaynn.fr
      </div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="action-btn" id="printBtn">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
    Imprimer / PDF
  </button>
  <button class="action-btn" id="shareBtn">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
    Partager
  </button>
  <button class="action-btn" id="copyBtn">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    Copier lien
  </button>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
(function() {
  const TARGET_URL = 'https://links.flaynn.fr/';

  // QR generation
  new QRCode(document.getElementById('qrSlot'), {
    text: TARGET_URL,
    width: 220,
    height: 220,
    colorDark: '#0D0D0D',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  // Toast
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  let toastTimer;
  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // Actions
  document.getElementById('printBtn').addEventListener('click', () => {
    window.print();
  });

  document.getElementById('shareBtn').addEventListener('click', async () => {
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Sirven Ouamba · Flaynn',
          text: 'Stop Pitching. Start Proving.',
          url: TARGET_URL
        });
      } catch (e) {
        if (e.name !== 'AbortError') showToast('Partage annulé');
      }
    } else {
      navigator.clipboard.writeText(TARGET_URL);
      showToast('Lien copié');
    }
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(TARGET_URL)
      .then(() => showToast('Lien copié'))
      .catch(() => showToast('Copie impossible'));
  });
})();
</script>

</body>
</html>
